spring:
  application:
    name: hs-api
  threads:
    virtual:
      enabled: true
  mongodb:
    uri: ${MONGODB_URI:mongodb://localhost:27017/hsapi}
    database: ${MONGODB_DATABASE:hsapi}
  data:
    mongodb:
      auto-index-creation: true
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    cache: true
  graphql:
    graphiql:
      enabled: ${GRAPHIQL_ENABLED:false}
    schema:
      locations: classpath:graphql/
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: ${HEALTH_DETAILS:never}

aws:
  region: ${AWS_REGION:us-east-1}
  healthlake:
    datastore-endpoint: ${HEALTHLAKE_ENDPOINT:}
  s3:
    bucket: ${S3_BUCKET:}

app:
  encryption-key: ${ENCRYPTION_KEY:}
  base-url: ${APP_BASE_URL:http://localhost:8080}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
