spring:
  mongodb:
    uri: mongodb://localhost:27017/healthsafe
    database: healthsafe
  graphql:
    graphiql:
      enabled: true

management:
  endpoint:
    health:
      show-details: always

aws:
  region: ${AWS_REGION:us-east-1}
  healthlake:
    datastore-endpoint: ${HEALTHLAKE_ENDPOINT:https://healthlake.us-east-1.amazonaws.com/datastore/8beccfc1f6ca1e8419ae9f29e5a46be5/r4/}
  s3:
    bucket: ${S3_BUCKET:healthsafe-shl-us-east-1}

app:
  encryption-key: ${ENCRYPTION_KEY:dev-encryption-key-32bytes-long!}
  base-url: ${APP_BASE_URL:http://localhost:8080}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
