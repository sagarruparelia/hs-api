spring:
  data:
    mongodb:
      uri: mongodb://localhost:27017/hsapi
  graphql:
    graphiql:
      enabled: true

management:
  endpoint:
    health:
      show-details: always

aws:
  region: us-east-1

app:
  encryption-key: dev-encryption-key-32bytes-long!!
  base-url: http://localhost:8080
  cors:
    allowed-origins: http://localhost:3000
